name: Python package

on:
  push:
    branches:
    - '**'
    tags-ignore:
    - '**'
  release:
    types:
    - published

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: pypa/cibuildwheel@v2.21.3
      env:
        # Build CPython 3.8–3.12 only; skip PyPy (poor numpy support)
        CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
        # Build native arm64 wheels on macos-14, plus x86_64 via Rosetta
        CIBW_ARCHS_MACOS: arm64 x86_64
        CIBW_ARCHS_LINUX: auto64
        CIBW_ARCHS_WINDOWS: auto64
        CIBW_BEFORE_ALL_MACOS: brew install llvm libomp
        # Include both Homebrew prefixes: /opt/homebrew (arm64) and /usr/local (x86_64/Rosetta)
        CIBW_ENVIRONMENT_MACOS: >-
          CC="clang" CXX="clang++"
          PATH="/opt/homebrew/opt/llvm/bin:/usr/local/opt/llvm/bin:$PATH"
          LDFLAGS="-L/opt/homebrew/opt/llvm/lib -L/usr/local/opt/llvm/lib"
          CPPFLAGS="-I/opt/homebrew/opt/llvm/include -I/usr/local/opt/llvm/include"
        CIBW_BEFORE_BUILD_MACOS: clang --version
        CIBW_BUILD_VERBOSITY: 1
    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  build-sdist:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Build sdist
      run: |
        python -m pip install build
        python -m build --sdist
    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: ./dist/*.tar.gz

  upload-pypi:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    - uses: pypa/gh-action-pypi-publish@release/v1
